services:
  metrics:
    build:
      context: .
      dockerfile: metrics/Dockerfile
    container_name: qiita-search-metrics
    environment:
      PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-qiita_elastic_app}
      PORT: 8090
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 3s
    restart: unless-stopped

  backend_python:
    build:
      context: .
      dockerfile: backend_python/Dockerfile
    container_name: qiita-search-backend-python
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend_elixir:
    build:
      context: .
      dockerfile: backend_elixir/Dockerfile
    container_name: qiita-search-backend-elixir
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:5000/health
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend_php:
    build:
      context: .
      dockerfile: backend_php/Dockerfile
    container_name: qiita-search-backend-php
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:5000/health') === false ? 1 : 0);"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend_java:
    build:
      context: .
      dockerfile: backend_java/Dockerfile
    container_name: qiita-search-backend-java
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend_go:
    build:
      context: .
      dockerfile: backend_go/Dockerfile
    container_name: qiita-search-backend-go
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  backend_ruby:
    build:
      context: .
      dockerfile: backend_ruby/Dockerfile
    container_name: qiita-search-backend-ruby
    environment:
      ES_URL: ${ES_URL:-http://elastic1:9200}
      ES_INDEX: ${ES_INDEX:-qiita-articles}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "Net::HTTP.get(URI('http://127.0.0.1:5000/health'))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    extra_hosts:
      - "elastic1:192.168.11.20"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: qiita-search-frontend
    ports:
      - "8082:8082"
    depends_on:
      metrics:
        condition: service_healthy
      backend_python:
        condition: service_healthy
      backend_elixir:
        condition: service_healthy
      backend_php:
        condition: service_healthy
      backend_java:
        condition: service_healthy
      backend_go:
        condition: service_healthy
      backend_ruby:
        condition: service_healthy
    restart: unless-stopped

  loadtest:
    profiles:
      - loadtest
    build:
      context: .
      dockerfile: loadtest/Dockerfile
    environment:
      TARGET_URL: ${TARGET_URL:-}
      SCENARIO: ${SCENARIO:-mixed}
      SEARCH_QUERY: ${SEARCH_QUERY:-Elasticsearch}
      VUS: ${VUS:-20}
      DURATION: ${DURATION:-1m}
      STAGES: ${STAGES:-}
      SLEEP_SECONDS: ${SLEEP_SECONDS:-0.2}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10s}
      MAX_ERROR_RATE: ${MAX_ERROR_RATE:-0.01}
      P95_LIMIT_MS: ${P95_LIMIT_MS:-1000}
      METRICS_URL: http://metrics:8090/metrics
      METRICS_INTERVAL: ${METRICS_INTERVAL:-2}
    volumes:
      - ./loadtest/results:/results
    depends_on:
      metrics:
        condition: service_healthy
