<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Elasticsearch で Qiita の技術記事を検索するアプリ">
    <title>Qiita Article Search</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
      window.tailwind = {
        config: {
          corePlugins: { preflight: false },
          theme: {
            extend: {
              colors: {
                qiita: {
                  bg: "#f4f7f5",
                  surface: "#ffffff",
                  text: "#17231d",
                  muted: "#64716a",
                  line: "#dce5df",
                  green: "#2f9b5f",
                  dark: "#197445",
                  light: "#e4f4ea"
                }
              },
              boxShadow: {
                soft: "0 12px 36px rgba(19, 58, 36, 0.08)"
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-qiita-bg text-qiita-text antialiased">
    <header class="site-header sticky top-0 z-20">
      <div class="container header-inner">
        <a class="brand transition hover:text-qiita-dark" href="/" data-route>
          <span class="brand-mark shadow-lg shadow-green-700/20">Q</span>
          <span>
            <strong>Qiita Article Search</strong>
            <small>Powered by Elasticsearch</small>
          </span>
        </a>
        <nav class="header-nav">
          <label class="backend-selector">
            <span>Backend</span>
            <select id="backend-select" class="transition hover:border-qiita-green focus:border-qiita-green focus:outline-none focus:ring-2 focus:ring-qiita-green/20" aria-label="利用するバックエンド">
              <option value="python">Python</option>
              <option value="elixir">Elixir</option>
              <option value="php">PHP</option>
              <option value="java">Java</option>
              <option value="go">Go</option>
              <option value="ruby">Ruby</option>
            </select>
          </label>
          <a class="all-articles-link transition hover:text-qiita-green" href="/all" data-route>全記事一覧</a>
          <a class="health-link transition hover:text-qiita-dark" href="/health" data-route>稼働状況</a>
        </nav>
      </div>
    </header>

    <main id="app" class="container" aria-live="polite">
      <div class="loading-state">読み込み中…</div>
    </main>

    <footer class="site-footer">
      <div class="container">Qiita articles × Elasticsearch</div>
    </footer>

    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
