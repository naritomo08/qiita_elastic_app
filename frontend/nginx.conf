server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
    }
}
