server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_connect_timeout 3s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    location ~* "^/static/.+\.[0-9a-f]{12}\.(css|js)$" {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /api/container-metrics {
        proxy_pass http://metrics:8090/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 8s;
        add_header Cache-Control "no-store";
    }

    location /api/python/ {
        rewrite ^/api/python/(.*)$ /api/$1 break;
        proxy_pass http://backend_python:5020;
        include /etc/nginx/proxy_params;
    }

    location /api/elixir/ {
        rewrite ^/api/elixir/(.*)$ /api/$1 break;
        proxy_pass http://backend_elixir:5021;
        include /etc/nginx/proxy_params;
    }

    location /api/php/ {
        rewrite ^/api/php/(.*)$ /api/$1 break;
        proxy_pass http://backend_php:5022;
        include /etc/nginx/proxy_params;
    }

    location /api/java/ {
        rewrite ^/api/java/(.*)$ /api/$1 break;
        proxy_pass http://backend_java:5023;
        include /etc/nginx/proxy_params;
    }

    location /api/go/ {
        rewrite ^/api/go/(.*)$ /api/$1 break;
        proxy_pass http://backend_go:5024;
        include /etc/nginx/proxy_params;
    }

    location /api/ruby/ {
        rewrite ^/api/ruby/(.*)$ /api/$1 break;
        proxy_pass http://backend_ruby:5025;
        include /etc/nginx/proxy_params;
    }

    location /health/python {
        rewrite ^/health/python(.*)$ /health$1 break;
        proxy_pass http://backend_python:5020;
        include /etc/nginx/proxy_params;
    }

    location /health/elixir {
        rewrite ^/health/elixir(.*)$ /health$1 break;
        proxy_pass http://backend_elixir:5021;
        include /etc/nginx/proxy_params;
    }

    location /health/php {
        rewrite ^/health/php(.*)$ /health$1 break;
        proxy_pass http://backend_php:5022;
        include /etc/nginx/proxy_params;
    }

    location /health/java {
        rewrite ^/health/java(.*)$ /health$1 break;
        proxy_pass http://backend_java:5023;
        include /etc/nginx/proxy_params;
    }

    location /health/go {
        rewrite ^/health/go(.*)$ /health$1 break;
        proxy_pass http://backend_go:5024;
        include /etc/nginx/proxy_params;
    }

    location /health/ruby {
        rewrite ^/health/ruby(.*)$ /health$1 break;
        proxy_pass http://backend_ruby:5025;
        include /etc/nginx/proxy_params;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
    }
}
